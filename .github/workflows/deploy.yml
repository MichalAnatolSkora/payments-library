name: Deploy API

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'src/testapp/**'
      - '.github/workflows/deploy.yaml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ./PaymentsLibrary.slnx

      - name: Build
        run: dotnet build ./PaymentsLibrary.slnx --configuration Release --no-restore

      - name: Publish
        run: dotnet publish testapp/Ava.WebApi/PaymentsLibrary.TestApp.csproj --configuration Release --no-build --output ./publish

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish
